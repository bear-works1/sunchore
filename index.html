<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sunrise — chores, then free time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --dusk:#3B0D2E; --ember:#C81D25; --flame:#F25C05;
    --amber:#FF9505; --gold:#FFD23F; --cream:#FFF4DA; --ink:#2B0A20;
    --display:"Fredoka","Trebuchet MS",sans-serif;
    --body:"Nunito","Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--body); font-size:15px; color:var(--cream); min-height:100vh; overflow-x:hidden;
    background-image:radial-gradient(130% 95% at 50% 105%, var(--gold) 0%, var(--amber) 20%, var(--flame) 42%, var(--ember) 66%, var(--dusk) 100%);
    background-attachment:fixed; padding:20px 16px 64px; display:flex; justify-content:center;
  }
  body[data-band="morning"]{background-image:radial-gradient(130% 95% at 50% 105%, #FFD23F 0%, #FF9505 22%, #E85D5D 48%, #8A3060 74%, #3F1C4E 100%)}
  body[data-band="day"]{background-image:radial-gradient(130% 95% at 50% 105%, #FFE27A 0%, #FFC72E 22%, #FF9505 46%, #F25C05 72%, #A63A00 100%)}
  body[data-band="sunset"]{background-image:radial-gradient(130% 95% at 50% 105%, #FFD23F 0%, #FF9505 20%, #F25C05 42%, #C81D25 66%, #3B0D2E 100%)}
  body[data-band="night"]{background-image:radial-gradient(130% 95% at 50% 105%, #C81D25 0%, #7A1E3C 26%, #3B0D2E 55%, #1A0620 80%, #0B0313 100%)}
  body::before{
    content:""; position:fixed; inset:-20%; pointer-events:none; z-index:0;
    background:radial-gradient(closest-side, rgba(255,210,63,.3), transparent 70%);
    animation:breathe 6s ease-in-out infinite;
  }
  body[data-band="day"]::before{background:radial-gradient(closest-side, rgba(255,210,63,.42), transparent 70%)}
  body[data-band="night"]::before{background:radial-gradient(closest-side, rgba(255,244,218,.13), transparent 70%)}
  @keyframes breathe{0%,100%{transform:scale(.9);opacity:.5}50%{transform:scale(1.18);opacity:1}}
  canvas#embers{position:fixed;inset:0;pointer-events:none;z-index:0}
  canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:99}
  #flash{position:fixed;inset:0;background:#FFF4DA;opacity:0;pointer-events:none;z-index:98}
  #flash.on{animation:flash .6s ease-out}
  @keyframes flash{0%{opacity:.85}100%{opacity:0}}
  .wrap{width:100%;max-width:680px;position:relative;z-index:1}

  .topbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .langs{display:flex;gap:6px;flex-wrap:wrap;margin-right:auto}
  .pill{
    font-family:var(--display);font-size:12px;font-weight:600;cursor:pointer;
    background:rgba(43,10,32,.3);color:var(--cream);
    border:2px solid rgba(255,244,218,.35);border-radius:99px;padding:5px 10px;
    transition:transform .12s,background .15s;
  }
  .pill:hover{transform:translateY(-2px) scale(1.05)}
  .pill.on{background:var(--cream);color:var(--ink);border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,210,63,.35)}
  .iconb{
    position:relative;width:38px;height:38px;border-radius:12px;cursor:pointer;font-size:17px;line-height:1;
    background:rgba(43,10,32,.3);border:2px solid rgba(255,244,218,.35);color:var(--cream);
    transition:transform .12s;
  }
  .iconb:hover{transform:scale(1.12) rotate(-6deg);background:rgba(255,244,218,.16)}

  .hero{text-align:center;padding:2px 0 2px}
  .mascot{width:130px;height:130px;margin:0 auto 6px;display:block;cursor:pointer;animation:bob 3s ease-in-out infinite}
  .mascot:hover{animation:spin2 .8s ease-in-out}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
  @keyframes spin2{to{transform:rotate(360deg) scale(1.15)}}
  h1{
    font-family:var(--display); font-weight:700;
    font-size:clamp(29px,7.5vw,49px); line-height:1.05; letter-spacing:-.01em;
    text-shadow:0 4px 0 rgba(43,10,32,.3), 0 0 34px rgba(255,210,63,.5);
  }
  h1 .w{display:inline-block;animation:wig 2.6s ease-in-out infinite}
  @keyframes wig{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-5px) rotate(-2deg)}75%{transform:translateY(3px) rotate(2deg)}}
  .sub{font-size:15px;opacity:.94;margin:12px auto 0;max-width:46ch;animation:dropIn .6s .1s both}
  @keyframes dropIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
  .card{
    background:rgba(255,244,218,.15); border:2px solid rgba(255,244,218,.34);
    backdrop-filter:blur(6px); border-radius:22px; padding:18px; margin-top:20px;
    animation:dropIn .6s .15s both; position:relative;
  }
  .lbl{font-family:var(--display);font-size:14px;letter-spacing:.06em;text-transform:uppercase;opacity:.9;margin-bottom:12px;display:block}
  .tag{font-style:normal;font-family:var(--display);text-transform:none;letter-spacing:0;font-size:12px;background:rgba(43,10,32,.35);border:1px solid rgba(255,244,218,.35);padding:3px 12px;border-radius:99px;margin-left:8px;vertical-align:1px}
  .chips{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
  .chip{
    display:flex;align-items:center;gap:8px;
    background:rgba(43,10,32,.24); border:2px solid transparent; border-radius:16px; padding:10px 12px;
    cursor:pointer; transition:transform .14s cubic-bezier(.2,1.6,.4,1),background .15s,border-color .15s,box-shadow .15s;
  }
  .chip:hover{transform:translateY(-4px) rotate(-1deg) scale(1.02);box-shadow:0 8px 18px rgba(43,10,32,.3)}
  .chip.on{background:var(--cream);color:var(--ink);border-color:var(--gold);box-shadow:0 0 0 4px rgba(255,210,63,.35)}
  .chip.pop{animation:pop .4s cubic-bezier(.2,1.9,.4,1)}
  @keyframes pop{0%{transform:scale(1)}35%{transform:scale(1.12) rotate(2deg)}100%{transform:scale(1)}}
  .chip .name{font-weight:800;font-size:14px;flex:1;text-align:left;min-width:0}
  .box{width:22px;height:22px;border-radius:7px;flex:none;border:2px solid currentColor;display:grid;place-items:center;font-size:12px;font-weight:800}
  .chip.on .box{background:var(--ember);border-color:var(--ember);color:var(--cream);animation:pop .4s}

  /* per-chip edit + delete */
  .chipact{display:flex;flex-direction:column;gap:4px;flex:none}
  .chipact button{
    width:22px;height:22px;border-radius:7px;border:none;cursor:pointer;font-size:11px;line-height:1;
    display:grid;place-items:center;background:rgba(43,10,32,.28);color:var(--cream);opacity:.78;
    transition:transform .1s,opacity .12s,background .15s,color .15s;
  }
  .chipact button:hover{opacity:1;transform:scale(1.18)}
  .chip.on .chipact button{background:rgba(43,10,32,.12);color:var(--ink)}
  .chipact .edit:hover{background:var(--gold);color:var(--ink)}
  .chipact .del:hover{background:var(--ember);color:var(--cream)}
  .rename{
    flex:1;min-width:60px;font-family:var(--body);font-weight:800;font-size:14px;
    background:rgba(255,244,218,.92);color:var(--ink);border:2px solid var(--gold);border-radius:10px;padding:4px 8px;
  }

  .mins{display:flex;align-items:center;gap:4px;font-family:var(--display);font-size:13px}
  .step{width:26px;height:24px;border-radius:8px;border:none;cursor:pointer;background:rgba(255,244,218,.28);color:inherit;font-weight:700;line-height:1;transition:transform .1s,background .15s}
  .chip.on .step{background:rgba(43,10,32,.12)}
  .step:hover{background:var(--gold);color:var(--ink);transform:scale(1.2)}
  .step:active{transform:scale(.85)}
  .m{min-width:46px;text-align:center;font-variant-numeric:tabular-nums;font-weight:600}
  @media (min-width:640px){
    .mins{flex-direction:column;gap:2px}
    .step{width:34px;height:20px}
    .plus{order:1} .m{order:2} .minus{order:3}
  }

  .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  input[type=text],input[type=number],input[type=time]{
    font-family:var(--body);font-weight:600;font-size:14px;
    background:rgba(43,10,32,.3);color:var(--cream);
    border:2px solid rgba(255,244,218,.3);border-radius:14px;padding:10px 12px;
  }
  input[type=text]{flex:1;min-width:160px}
  input[type=number]{width:88px}
  input::placeholder{color:rgba(255,244,218,.55)}
  .times{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
  .tlab{display:flex;flex-direction:column;gap:6px;font-family:var(--display);font-size:11px;letter-spacing:.05em;text-transform:uppercase;opacity:.9}
  .arrow{font-size:18px;padding-bottom:12px;opacity:.75}
  .budget{
    margin-top:14px;display:inline-block;font-weight:800;font-size:13px;
    background:rgba(43,10,32,.28);border:1px solid rgba(255,244,218,.25);
    padding:8px 12px;border-radius:12px;
  }
  .budget.bad{background:rgba(200,29,37,.5);animation:pop .4s}
  button{font-family:var(--display)}
  .ghost{background:transparent;border:2px dashed rgba(255,244,218,.55);color:var(--cream);border-radius:14px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .12s}
  .ghost:hover{border-style:solid;background:rgba(255,244,218,.14);transform:rotate(-1deg) scale(1.04)}
  .go{
    display:block;width:100%;margin-top:22px;border:none;border-radius:20px;cursor:pointer;
    background:linear-gradient(100deg,var(--cream),#FFE9B8,var(--cream));background-size:200% 100%;
    color:var(--ember);font-size:21px;font-weight:700;padding:18px;
    box-shadow:0 6px 0 rgba(43,10,32,.4), 0 0 30px rgba(255,210,63,.35);
    transition:transform .1s,box-shadow .1s; animation:shine 3s linear infinite, wobble 4s ease-in-out infinite;
  }
  @keyframes shine{to{background-position:-200% 0}}
  @keyframes wobble{0%,100%{transform:rotate(0)}25%{transform:rotate(-.5deg)}75%{transform:rotate(.5deg)}}
  .go:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 9px 0 rgba(43,10,32,.4), 0 0 44px rgba(255,210,63,.6)}
  .go:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(43,10,32,.4)}
  .go:disabled{opacity:.45;cursor:not-allowed;animation:none;transform:none;box-shadow:0 6px 0 rgba(43,10,32,.4)}

  .horizon{position:relative;height:170px;margin-top:10px;border-radius:22px;overflow:hidden;border:2px solid rgba(255,244,218,.34)}
  .horizon svg{position:absolute;inset:0;width:100%;height:100%}
  #sunGroup,#moonGroup{transition:transform 1s cubic-bezier(.34,1.3,.5,1)}
  #rays{transform-origin:330px 150px;animation:spin 18s linear infinite}
  #halo{transform-origin:330px 150px;animation:spin 46s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #dawn{transition:opacity 1s ease}
  #stars{transition:opacity 1.2s ease}
  .tw{animation:twinkle 2.2s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
  .cloud{opacity:.34;animation:drift 26s linear infinite}
  .cloud.b{animation-duration:38s;animation-delay:-9s;opacity:.2}
  @keyframes drift{from{transform:translateX(-140px)}to{transform:translateX(760px)}}
  .status{position:absolute;left:16px;bottom:12px;font-family:var(--display);font-size:16px;color:var(--ink);font-weight:600}
  .bar{position:absolute;right:16px;bottom:14px;height:10px;width:38%;background:rgba(43,10,32,.3);border-radius:99px;overflow:hidden}
  .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--ember),var(--gold));transition:width .8s cubic-bezier(.3,1.4,.5,1)}
  body[data-band="night"] .status{color:var(--cream)}
  .deadsub{margin-top:8px;font-family:var(--display);font-size:15px;font-weight:600;opacity:.95}

  ul{list-style:none;margin-top:18px;display:flex;flex-direction:column;gap:10px}
  li{
    display:flex;align-items:center;gap:12px;
    background:rgba(255,244,218,.15);border:2px solid rgba(255,244,218,.32);
    border-radius:18px;padding:12px 14px;
    transition:opacity .3s,background .2s,transform .2s;
    animation:slideIn .5s cubic-bezier(.2,1.4,.4,1) both;
  }
  @keyframes slideIn{from{opacity:0;transform:translateX(-30px) rotate(-2deg)}to{opacity:1;transform:none}}
  li.now{background:var(--cream);color:var(--ink);border-color:var(--gold);animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(255,210,63,.35)}50%{box-shadow:0 0 0 12px rgba(255,210,63,.1)}}
  li.done{opacity:.5}
  li.done .task{text-decoration:line-through}
  li.zap{animation:zap .45s cubic-bezier(.2,1.9,.3,1)}
  @keyframes zap{0%{transform:scale(1)}30%{transform:scale(1.07) rotate(-1.2deg)}100%{transform:scale(1)}}
  .clock{font-family:var(--display);font-weight:700;font-size:14px;font-variant-numeric:tabular-nums;min-width:96px}
  .task{font-weight:800;font-size:15px;flex:1}
  .dur{font-size:12px;font-weight:800;opacity:.7;font-variant-numeric:tabular-nums}
  .tick{width:38px;height:38px;flex:none;border-radius:12px;border:2px solid currentColor;background:transparent;color:inherit;font-size:17px;font-weight:700;cursor:pointer;transition:transform .12s}
  .tick:hover{transform:scale(1.18) rotate(8deg)}
  li.now .tick{background:var(--ember);border-color:var(--ember);color:var(--cream)}
  li.done .tick{background:var(--ink);border-color:var(--ink);color:var(--gold)}

  .free{margin-top:20px;text-align:center;padding:26px;border-radius:22px;background:var(--cream);color:var(--ember);animation:bounceIn .8s cubic-bezier(.2,1.7,.4,1);box-shadow:0 0 60px rgba(255,210,63,.7)}
  @keyframes bounceIn{0%{opacity:0;transform:scale(.6) rotate(-5deg)}60%{transform:scale(1.08) rotate(1deg)}100%{opacity:1;transform:none}}
  .free h2{font-family:var(--display);font-size:clamp(27px,7vw,43px);line-height:1.1;animation:rainbow 1.2s ease-in-out infinite alternate}
  @keyframes rainbow{from{color:var(--ember)}to{color:var(--amber)}}
  .free p{color:var(--ink);font-weight:600;margin-top:6px}
  .freestreak{margin-top:8px;font-family:var(--display);font-weight:700;font-size:17px;color:var(--ember)!important}
  .freestreak:empty{display:none}
  .again{margin-top:14px;border:none;border-radius:16px;background:var(--ember);color:var(--cream);font-size:16px;font-weight:700;padding:12px 22px;cursor:pointer;transition:transform .12s}
  .again:hover{transform:scale(1.06) rotate(-1.5deg)}
  .hidden{display:none!important}

  .tut{position:fixed;inset:0;z-index:120;background:rgba(26,6,32,.72);backdrop-filter:blur(4px);display:grid;place-items:center;padding:20px}
  .tcard{
    background:var(--cream);color:var(--ink);border:4px solid var(--gold);border-radius:26px;
    position:relative;padding:26px 22px 20px;max-width:430px;width:100%;text-align:center;
    box-shadow:0 0 70px rgba(255,210,63,.65);animation:bounceIn .6s cubic-bezier(.2,1.7,.4,1);
  }
  .tmoji{font-size:46px;animation:bob 2.4s ease-in-out infinite}
  .tcard h3{font-family:var(--display);font-size:23px;margin-top:8px;color:var(--ember)}
  .tcard p{margin-top:8px;font-weight:600;line-height:1.45}
  .tdots{display:flex;gap:7px;justify-content:center;margin:16px 0 14px}
  .tdots i{width:10px;height:10px;border-radius:99px;background:rgba(43,10,32,.2);transition:background .2s,transform .2s}
  .tdots i.on{background:var(--flame);transform:scale(1.3)}
  .trow{display:flex;gap:10px;justify-content:space-between}
  .tskip{background:transparent;border:2px dashed rgba(43,10,32,.35);color:var(--ink);border-radius:14px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer}
  .tskip:hover{border-style:solid}
  .tnext{flex:1;border:none;border-radius:14px;background:var(--ember);color:var(--cream);font-size:17px;font-weight:700;padding:12px 18px;cursor:pointer;transition:transform .12s;box-shadow:0 4px 0 rgba(43,10,32,.3)}
  .tnext:hover{transform:translateY(-2px) scale(1.02)}
  .tnext:active{transform:translateY(2px)}
  .fcol{flex-direction:column}
  .fcol .tskip,.fcol .tnext{width:100%}
  .tnext.hold{animation:pulse 1.6s ease-in-out infinite;touch-action:none;user-select:none;-webkit-user-select:none}
  .badge{position:absolute;top:-8px;right:-8px;background:var(--ember);color:var(--cream);font-family:var(--display);font-size:10px;font-weight:700;border-radius:99px;padding:2px 6px;border:2px solid var(--gold);pointer-events:none;animation:pop .4s}
  li.gold{border-color:var(--gold);box-shadow:0 0 16px rgba(255,210,63,.5), inset 0 0 18px rgba(255,210,63,.14)}
  li.gold .task::after{content:" ✨"}
  li.boss .task::before{content:"👑 "}
  .eye{transform-box:fill-box;transform-origin:center;animation:blink 4.6s ease-in-out infinite}
  @keyframes blink{0%,91%,100%{transform:scaleY(1)}95%{transform:scaleY(.12)}}
  #flash.gold{background:var(--gold)}
  h1 .w{cursor:pointer}
  h1 .w.pop{animation:pop .4s cubic-bezier(.2,1.9,.4,1)}
  .pcall{font-size:16px;padding:13px;margin-top:14px}
  .pchint{margin-top:10px;font-weight:800;font-size:13px;opacity:.85}
  #pcList{margin-top:10px;max-height:240px;text-align:left}
  #pcList .hrow{cursor:pointer;user-select:none;-webkit-user-select:none}
  #pcList .hrow.redo{background:rgba(200,29,37,.16);border-color:var(--ember)}
  #pcList .hrow.redo .hd{text-decoration:line-through}
  .psay{margin-top:10px;font-style:italic;font-weight:700;color:var(--ink);opacity:.85}
  .psay:empty{display:none}
  .vcphrase{margin-top:10px;font-family:var(--display);font-size:19px;color:var(--ember);font-weight:700}
  .vmeter{position:relative;height:16px;border-radius:99px;margin-top:14px;border:2px solid rgba(43,10,32,.25);background:linear-gradient(90deg,var(--gold),var(--amber) 55%,var(--ember))}
  .vneedle{position:absolute;top:-7px;left:0%;width:6px;height:26px;border-radius:3px;background:var(--ink);transition:left .12s;transform:translateX(-3px)}
  .vlabels{display:flex;justify-content:space-between;font-size:11px;font-weight:800;opacity:.8;margin-top:4px}
  .vcpriv{margin-top:8px;font-size:11px;font-weight:700;opacity:.65}

  /* history */
  .hcard{max-width:470px;text-align:left}
  .hhead{display:flex;justify-content:space-between;align-items:center}
  .hhead h3{font-family:var(--display);font-size:22px;color:var(--ember)}
  .hclose{border:none;background:rgba(43,10,32,.12);width:36px;height:36px;border-radius:12px;font-size:16px;cursor:pointer;color:var(--ink);transition:transform .12s}
  .hclose:hover{transform:scale(1.12) rotate(8deg)}
  .tclose{position:absolute;top:12px;right:12px}
  .hbest{margin-top:8px;font-weight:800;color:var(--flame)}
  .hbest:empty{display:none}

  /* streaks & stats */
  .hstats{display:grid;grid-template-columns:repeat(auto-fit,minmax(82px,1fr));gap:8px;margin-top:12px}
  .stat{background:rgba(43,10,32,.06);border:2px solid rgba(43,10,32,.1);border-radius:14px;padding:9px 6px;text-align:center}
  .stat.hero{grid-column:1/-1;background:linear-gradient(100deg,rgba(242,92,5,.14),rgba(255,210,63,.2));border-color:rgba(242,92,5,.35)}
  .stat.hero b{font-size:26px}
  .stat b{display:block;font-family:var(--display);font-weight:700;font-size:19px;color:var(--flame);line-height:1.15}
  .stat span{display:block;font-size:10.5px;font-weight:800;opacity:.75;margin-top:2px}

  .hlist{margin-top:14px;max-height:300px;overflow:auto;display:flex;flex-direction:column;gap:8px;padding-right:4px}
  .hempty{font-weight:600;opacity:.8;line-height:1.5}
  .hrow{background:rgba(43,10,32,.07);border:2px solid rgba(43,10,32,.12);border-radius:14px;padding:10px 12px}
  .hrow .hd{display:flex;justify-content:space-between;align-items:center;font-family:var(--display);font-weight:600;gap:8px}
  .hrow .hm{font-size:13px;font-weight:700;opacity:.85;margin-top:3px}
  .fb{font-size:11px;font-weight:800;padding:3px 9px;border-radius:99px;background:rgba(43,10,32,.1);white-space:nowrap}
  .fb.up{background:rgba(255,210,63,.55)}
  .hbar{height:8px;background:rgba(43,10,32,.14);border-radius:99px;margin-top:8px;overflow:hidden}
  .hbar i{display:block;height:100%;background:linear-gradient(90deg,var(--flame),var(--gold))}

  #shout{
    position:fixed;left:50%;top:36%;transform:translate(-50%,-50%);z-index:100;pointer-events:none;
    font-family:var(--display);font-weight:700;font-size:clamp(35px,10vw,75px);color:var(--cream);

/* streaks & stats derived from saved days */
function computeStats(){
  if(!hist.length) return null;
  const dk=iso=>new Date(iso).toLocaleDateString("en-CA");        /* YYYY-MM-DD in local time */
  const days=[...new Set(hist.map(h=>dk(h.d)))].sort().reverse(); /* unique days, newest first */
  const todayKey=new Date().toLocaleDateString("en-CA");
  const yKey=new Date(Date.now()-864e5).toLocaleDateString("en-CA");
  let streak=0;
  if(days[0]===todayKey || days[0]===yKey){
    let cur=new Date(days[0]+"T12:00:00");                        /* noon dodges DST edges */
    for(const d of days){
      if(d===cur.toLocaleDateString("en-CA")){ streak++; cur=new Date(cur.getTime()-864e5); }
      else break;
    }
  }
  return {
    streak,
    totalDays:days.length,
    totalChores:hist.reduce((s,h)=>s+h.n,0),
    best:Math.min(...hist.map(h=>h.a)),
    onTimePct:Math.round(hist.filter(h=>h.a<=h.p).length/hist.length*100)
  };
}
function updateBadge(){
  const st=computeStats(), b=$("streakBadge");
  if(st&&st.streak>=2){ b.textContent="🔥"+st.streak; b.classList.remove("hidden"); }
  else b.classList.add("hidden");
}

function renderHist(){
  const T=L().t;
  $("hTitle").textContent="📅 "+T.hist;
  const st=computeStats();
  if(!st){ $("hBest").textContent=""; $("hStats").innerHTML=""; $("hList").innerHTML=`<p class="hempty">${T.histEmpty}</p>`; return; }
  $("hBest").textContent="";
  $("hStats").innerHTML=`
    <div class="stat hero"><b>🔥 ${st.streak}</b><span>${T.statStreak}</span></div>
    <div class="stat"><b>✅ ${st.totalDays}</b><span>${T.statDays}</span></div>
    <div class="stat"><b>🧹 ${st.totalChores}</b><span>${T.statChores}</span></div>
    <div class="stat"><b>⚡ ${st.best}${T.mS}</b><span>${T.statBest}</span></div>
    <div class="stat"><b>🎯 ${st.onTimePct}%</b><span>${T.statOnTime}</span></div>`;
  $("hList").innerHTML="";
  hist.forEach((h,i)=>{
    const prev=hist[i+1];
    const badge = prev ? (h.a<prev.a?`<span class="fb up">${T.fasterS}</span>`:h.a>prev.a?`<span class="fb">${T.slowerS}</span>`:"") : "";
    const date=new Date(h.d).toLocaleDateString(LOCALE[lang],{month:"short",day:"numeric"});
    const pct=Math.min(100,Math.round(h.a/h.p*100));
    const row=document.createElement("div"); row.className="hrow";
    row.innerHTML=`<div class="hd"><span>${BAND_EMOJI[h.b]||"🌇"} ${date}</span>${badge}</div>
      <div class="hm">${T.rowT.replace("{n}",h.n).replace("{p}",h.p).replace("{a}",h.a)}</div>
      <div class="hbar"><i style="width:${pct}%;${h.a>h.p?"background:var(--ember)":""}"></i></div>`;
    $("hList").appendChild(row);
  });
}

let audioCtx=null, soundOn=true;
function beep(f,d,type="square",vol=.14,when=0){
  if(!soundOn) return;
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    const t=audioCtx.currentTime+when, o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.001,t+d);
    o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t+d+.02);
  }catch(e){}
}

function positionSky(p){
  const moonMode=BANDS[band].moon;
  const sway=Math.sin(p*Math.PI*2.2)*150;
  if(moonMode){
    /* rising moon tops out fully inside the frame — no more chopped moon */
    $("moonGroup").setAttribute("transform",`translate(${(sway*.6).toFixed(1)},${(-p*84).toFixed(1)}) rotate(${(p*10).toFixed(1)} 330 150)`);
    $("sunGroup").setAttribute("transform",`translate(${(-sway*.4).toFixed(1)},${(-6+p*150).toFixed(1)}) rotate(${(-p*8).toFixed(1)} 330 150)`);
  } else {
    $("sunGroup").setAttribute("transform",`translate(${sway.toFixed(1)},${(-p*128).toFixed(1)}) rotate(${(p*14).toFixed(1)} 330 150)`);
    /* setting moon starts lower so its circle never clips the top edge */
    $("moonGroup").setAttribute("transform",`translate(${(-sway*.5).toFixed(1)},${(-98+p*210).toFixed(1)}) rotate(${(-p*8).toFixed(1)} 330 150)`);
  }
  $("dawn").setAttribute("opacity",p.toFixed(2));
  const s=BANDS[band].stars;
  $("stars").style.opacity = s==="in" ? p.toFixed(2) : s==="out" ? (1-p).toFixed(2) : 0;
  $("shades").setAttribute("opacity",(!moonMode&&p===1)?1:0);
  $("mshades").setAttribute("opacity",(moonMode&&p===1)?1:0);
}

function windowMins(){
  const [h1,m1]=$("startTime").value.split(":").map(Number);
  const [h2,m2]=$("endTime").value.split(":").map(Number);
  let s=h1*60+m1, e=h2*60+m2;
  if(e<=s) e+=1440; /* crosses midnight — night missions allowed! */
  return {s,e,w:e-s};
}
const sumSel=()=>chores.filter(c=>c.on).reduce((a,c)=>a+c.mins,0);
function updateBudget(){
  const T=L().t, {w}=windowMins(), c=sumSel(), d=w-c;
  let tail = c===0 ? "" : d>0 ? " · "+T.spareS.replace("{m}",d) : d===0 ? " · "+T.exactS : " · "+T.overS.replace("{m}",-d);
  $("budget").textContent=`⏱ ${T.win.replace("{w}",w)} · ${T.sum.replace("{c}",c)}${tail}`;
  $("budget").classList.toggle("bad", d<0 && c>0);
  $("makeBtn").disabled = !chores.some(x=>x.on) || d<0;
}
$("startTime").addEventListener("input",()=>{
  const v=$("startTime").value; if(!v) return;
  const [h,m]=v.split(":").map(Number);
  const nb=bandFor(h*60+m);
  if(nb!==band){ applyBand(nb); sparkle(innerWidth/2,innerHeight*.35,24); }
  updateBudget();
});
$("endTime").addEventListener("input",updateBudget);

let fcStep=0, fcSteps=[], lastDone=-1;

function needsSpeedCheck(){
  if(plan.fchecked) return false;                 /* passing is the only way out */
  const planned=plan.reduce((s,c)=>s+c.mins,0);
  const actual=(Date.now()-planStartedAt)/60000;
  return planned>=4 && actual<planned*.5;

function openFcheck(){

  fcSteps=[
    {q:F.qs[0].q,y:F.qs[0].y,n:F.qs[0].n},

    {q:F.qs[2].q,y:F.qs[2].y,n:F.qs[2].n},

}
function beginHold(){
  const st=fcSteps[fcStep];
  if(!st||!st.hold||holdStart||holdDone) return;
  holdStart=Date.now(); holdSec=0;
  const tick=()=>{
    if(!holdStart) return;
    const p=Math.min(1,(Date.now()-holdStart)/3000);
    paintHold(p);
    const sec=Math.floor(p*3);
    if(sec>holdSec){ holdSec=sec; beep(480+sec*170,.09,"square",.1); }
    if(p>=1){ holdDone=true; holdStart=0; fcPass(); return; }
    holdRAF=requestAnimationFrame(tick);

/* --- voice check: local pitch analysis, nothing recorded --- */
let vcState="idle", vcStream=null, vcRAF=0, vcSamples=[];
const vcBuf=new Float32Array(2048), VC_MAX_HZ=235;
function detectPitch(buf,sr){
  const N=buf.length;
  let energy=0; for(let i=0;i<N;i++) energy+=buf[i]*buf[i];
  if(Math.sqrt(energy/N)<0.02) return -1;                 /* too quiet = not voicing */
  const minLag=Math.floor(sr/380), maxLag=Math.min(N-8,Math.floor(sr/70));
  let best=-1,bestC=0;
  for(let lag=minLag;lag<=maxLag;lag++){
    let c=0;
    for(let i=0;i<N-lag;i++) c+=buf[i]*buf[i+lag];
    if(c>bestC){bestC=c;best=lag;}
  }
  return (best>0&&bestC/energy>0.25)?sr/best:-1;
}
function vcNeedle(hz){ const pct=Math.min(100,Math.max(0,(hz-80)/280*100)); $("vNeedle").style.left=pct+"%"; }
async function vcStart(){
  stopVoice(); vcSamples=[]; vcState="listening"; renderParent();
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){ vcState="error"; renderParent(); delSnd(); return; }
  let stream;
  try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ vcState="error"; renderParent(); delSnd(); return; }
  vcStream=stream;
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==="suspended") await audioCtx.resume();
    const src=audioCtx.createMediaStreamSource(stream);
    const an=audioCtx.createAnalyser(); an.fftSize=2048;
    src.connect(an);
    const deadline=Date.now()+7000;
    const loop=()=>{
      if(vcState!=="listening") return;
      an.getFloatTimeDomainData(vcBuf);
      const hz=detectPitch(vcBuf,audioCtx.sampleRate);
      if(hz>0){ vcSamples.push(hz); vcNeedle(hz); }
      if(vcSamples.length>=26){ vcFinish(); return; }
      if(Date.now()>deadline){ vcSamples.length>=10?vcFinish():vcNone(); return; }
      vcRAF=requestAnimationFrame(loop);
    };
    loop();
  }catch(e){ stopVoice(); vcState="error"; renderParent(); }
}
function vcFinish(){
  stopVoice();
  const a=[...vcSamples].sort((x,y)=>x-y), med=a[(a.length/2)|0];
  vcNeedle(med);
  if(med<=VC_MAX_HZ){ vcState="pass"; renderParent(); dingSnd(); boomSnd(); setTimeout(pcApprove,900); }
  else { vcState="fail"; renderParent(); delSnd(); }
}
function vcNone(){ stopVoice(); vcState="none"; renderParent(); }
function stopVoice(){
  cancelAnimationFrame(vcRAF);
  if(vcStream){ vcStream.getTracks().forEach(t=>t.stop()); vcStream=null; }
}

let lastCheck=0, combo=0;
function renderBoard(zapIdx=-1){
  const T=L().t;
  listEl.innerHTML="";
  const nextIdx=plan.findIndex(c=>!c.done);
  plan.forEach((c,i)=>{
    const li=document.createElement("li");
    li.className=(c.done?"done":"")+(i===nextIdx?" now":"")+(i===zapIdx?" zap":"")+(c.gold?" gold":"")+(c.boss?" boss":"");
    li.style.animationDelay=(i*60)+"ms";
    li.innerHTML=`<span class="clock">${fmt(c.start)}</span><span class="task">${nameOf(c)}</span>
      <span class="dur">${c.mins}${T.mS}</span>
      <button class="tick" aria-label="${T.mark} ${nameOf(c)}">${c.done?"✓":""}</button>`;
    li.querySelector(".tick").onclick=e=>{
      c.done=!c.done;
      if(c.done){
        lastDone=i;
        const now=Date.now();
        combo = now-lastCheck<5000 ? combo+1 : 1; lastCheck=now;
        sparkle(e.clientX,e.clientY,50); popSnd(combo);
        if(combo>=3) firework(e.clientX);
        if(combo>=4) flashGold();
        if(c.gold){ shout(T.gold); goldSnd(); burst(170); firework(e.clientX); }
        else if(c.boss){ shout(T.boss); boomSnd(); burst(150); }
        else if(combo>=2){ shout(T.combo.replace("{n}",combo)); burst(60+combo*35); }
        else { shout(L().shouts[(Math.random()*L().shouts.length)|0]); burst(90); }
      }
      renderBoard(i);
    };
    listEl.appendChild(li);
  });

  const done=plan.filter(c=>c.done).length, p=done/plan.length;
  $("status").textContent = done===plan.length ? T.wins[band] : T.done.replace("{x}",done).replace("{y}",plan.length);
  $("barFill").style.width=(p*100)+"%";
  positionSky(p);

  const all=done===plan.length;
  if(all && !renderBoard.party && needsSpeedCheck()){ $("free").classList.add("hidden"); $("pcallBtn").classList.add("hidden"); openFcheck(); return; }
  if(all && !renderBoard.party && !plan.parentOK){
    $("free").classList.add("hidden");
    $("pcallBtn").classList.remove("hidden");
    if(!plan.parentAsked){ plan.parentAsked=true; openParent(); }
    return;
  }
  $("pcallBtn").classList.add("hidden");
  $("free").classList.toggle("hidden",!all);
  if(all && !renderBoard.party){
    renderBoard.party=true;
    $("freeMsg").textContent=T.freeM;
    if(!plan.saved){
      plan.saved=true;
      const actual=Math.max(1,Math.round((Date.now()-planStartedAt)/60000));
      const prevBest=hist.length?Math.min(...hist.map(h=>h.a)):Infinity;
      hist.unshift({d:new Date().toISOString(),n:plan.length,p:plan.reduce((s,c)=>s+c.mins,0),a:actual,b:band});
      saveHist(); updateBadge();
      if(hist.length>1 && actual<prevBest){
        setTimeout(()=>{ shout(L().t.rec); tadaSnd(); boomSnd(); firework(innerWidth*.3); firework(innerWidth*.7); },6400);
      }
    }
    const st=computeStats();
    $("freeStreak").textContent = st && st.streak>=2 ? T.streakMsg.replace("{n}",st.streak) : "";
    megaParty();
  }
  if(!all) renderBoard.party=false;
}

const ev=$("embers"), ectx=ev.getContext("2d");
let bits=[], sparks=[], shoots=[];
function size(){ [cv,ev].forEach(c=>{c.width=innerWidth;c.height=innerHeight;}); }
addEventListener("resize",size); size();
addEventListener("pointermove",e=>{
  if(reduce||Date.now()>trailUntil||Math.random()<.45) return;
  sparks.push({x:e.clientX,y:e.clientY,vx:(Math.random()-.5)*2,vy:-1-Math.random()*1.5,life:26,c:COLORS[(Math.random()*COLORS.length)|0],s:1.4+Math.random()*1.8});
});

function make(x,y,vx,vy){
  return {x,y,vx,vy,s:5+Math.random()*10,r:Math.random()*6,vr:(Math.random()-.5)*.55,
    shape:Math.random()<.3?"c":(Math.random()<.5?"s":"t"),
    c:COLORS[(Math.random()*COLORS.length)|0],life:150};
}
function burst(n){
  if(reduce) return;
  for(let i=0;i<n;i++) bits.push(make(innerWidth/2+(Math.random()-.5)*320, innerHeight*.45,(Math.random()-.5)*18,-Math.random()*19-5));
}
function cannon(x,y,n,ang){
  if(reduce) return;
  for(let i=0;i<n;i++){
    const a=ang+(Math.random()-.5)*.7, sp=14+Math.random()*16;
    bits.push(make(x,y,Math.cos(a)*sp,Math.sin(a)*sp));
  }
}
function sparkle(x,y,n){
  if(reduce) return;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=1+Math.random()*7;
    sparks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:45,c:COLORS[(Math.random()*COLORS.length)|0],s:2+Math.random()*3});
  }
}
let rockets=[], trailUntil=0;
function firework(x){
  if(reduce) return;
  rockets.push({x:x??innerWidth/2, y:innerHeight+8, vx:(Math.random()-.5)*1.6, vy:-(12+Math.random()*4.5), ty:innerHeight*(0.16+Math.random()*0.28), c:COLORS[(Math.random()*COLORS.length)|0]});
}
function explode(x,y,c){
  beep(130,.18,"sine",.06);
  const n=46+(Math.random()*26|0);
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n+Math.random()*.25, sp=2.4+Math.random()*4.6;
    sparks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:52+Math.random()*22,c:Math.random()<.25?"#FFF4DA":c,s:1.8+Math.random()*2.2,crackle:Math.random()<.22});
  }
}
let emb=[];
for(let i=0;i<45;i++) emb.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,s:1+Math.random()*3,v:.3+Math.random()*1.1,a:Math.random()});

(function loop(){
  ectx.clearRect(0,0,ev.width,ev.height);
  if(!reduce){
    for(const e of emb){
      e.y-=e.v; e.a+=.03; e.x+=Math.sin(e.a)*.5;
      if(e.y<-10){e.y=innerHeight+10;e.x=Math.random()*innerWidth;}
      ectx.globalAlpha=.35+Math.sin(e.a)*.25; ectx.fillStyle=emberColor;
      ectx.beginPath(); ectx.arc(e.x,e.y,e.s,0,7); ectx.fill();
    }
    if(band==="night"&&Math.random()<.006) shoots.push({x:Math.random()*innerWidth*.7,y:Math.random()*innerHeight*.25,vx:10+Math.random()*6,vy:4+Math.random()*2,life:32});
    shoots=shoots.filter(s=>s.life>0);
    for(const s of shoots){
      ectx.globalAlpha=s.life/32; ectx.strokeStyle="#FFF4DA"; ectx.lineWidth=2;
      ectx.beginPath(); ectx.moveTo(s.x,s.y); ectx.lineTo(s.x-s.vx*3,s.y-s.vy*3); ectx.stroke();
      s.x+=s.vx; s.y+=s.vy; s.life--;
    }
  }
  ectx.globalAlpha=1;

  ctx.clearRect(0,0,cv.width,cv.height);
  rockets=rockets.filter(r=>!r.dead);
  for(const r of rockets){
    r.x+=r.vx; r.y+=r.vy; r.vy+=.14;
    sparks.push({x:r.x,y:r.y+5,vx:(Math.random()-.5)*.8,vy:1.2,life:13,c:r.c,s:1.4});
    ctx.globalAlpha=.95; ctx.fillStyle="#FFF4DA";
    ctx.beginPath(); ctx.arc(r.x,r.y,2.6,0,7); ctx.fill();
    if(r.vy>=-1.6||r.y<=r.ty){ r.dead=true; explode(r.x,r.y,r.c); }
  }
  bits=bits.filter(b=>b.life>0&&b.y<cv.height+60);
  for(const b of bits){
    b.vy+=.3; b.x+=b.vx+Math.sin(b.life/9)*.8; b.y+=b.vy; b.vx*=.99; b.r+=b.vr; b.life--;
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.r);
    ctx.fillStyle=b.c; ctx.globalAlpha=Math.min(1,b.life/40);
    if(b.shape==="c"){ctx.beginPath();ctx.arc(0,0,b.s/2,0,7);ctx.fill();}
    else if(b.shape==="t"){ctx.fillRect(-b.s/6,-b.s,b.s/3,b.s*2);}
    else{ctx.fillRect(-b.s/2,-b.s/2,b.s,b.s*.6);}
    ctx.restore();
  }
  sparks=sparks.filter(s=>s.life>0);
  for(const s of sparks){
    s.vy+=.12; s.x+=s.vx; s.y+=s.vy; s.life--;
    if(s.crackle&&s.life<=1){
      s.crackle=false;
      for(let k=0;k<6;k++){ const a=Math.random()*6.283, sp=1+Math.random()*2.5;
        sparks.push({x:s.x,y:s.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:18,c:"#FFF4DA",s:1.3}); }
    }
    ctx.globalAlpha=Math.min(1,s.life/45); ctx.fillStyle=s.c;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.s,0,7); ctx.fill();
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(loop);
})();

applyLang("en");
(async()=>{
  let seen=false;
  try{ if(window.storage){ const r=await window.storage.get("sunrise-tut-seen"); seen=!!(r&&r.value); } }catch(e){}
  if(!seen) setTimeout(openTut,400);
})();
</script>
</body>
</html>
